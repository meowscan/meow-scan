<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meow Scan - App</title>

  <!-- Fontes e Ícones -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj9E-kA-zxQoW_9n37UDtVUc_TH4QhHUJ7ZCxyZWj1zj06dh53wI7Iviqbbs1Y6bId-MYSLEOWZTuuC5a_U9TB4YvMMluSf_Xg65MV437qnxzApy472qVOwvUTnyZgJti8XpDiExf312gj0ogzo8vzvPYhsaczya-oZTS7ztLjd5dCGCTwJVarVoY_VZwUr/s400/6576.png">

  <style>
    /* VARIÁVEIS DINÂMICAS (Podem ser alteradas nas configurações) */
    :root {
      --bg-color: #0d0d12;
      --text-color: #ffffff;
      --primary: #cba6f7; /* Cor base dos ícones do app */
      --card-bg: #14141c;
      --font-family: 'Poppins', sans-serif;
      --bg-image: none;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background-color: var(--bg-color);
      background-image: var(--bg-image);
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: var(--text-color);
      font-family: var(--font-family);
      padding-bottom: 70px; /* Espaço para o menu inferior */
      user-select: none;
      min-height: 100vh;
    }

    /* TOP BAR & BUSCA */
    .top-bar {
      padding: 15px 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: rgba(13, 13, 18, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 800;
    }
    .brand img { width: 35px; border-radius: 8px; }

    .search-box {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-box input {
      background: transparent;
      border: none;
      color: var(--text-color);
      width: 100%;
      outline: none;
      font-family: inherit;
    }

    /* FILTROS DE STATUS */
    .filters {
      display: flex;
      gap: 10px;
      padding: 0 20px;
      overflow-x: auto;
      scrollbar-width: none;
      margin-top: 10px;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-color);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .filter-btn.active { background: var(--primary); color: #000; }

    /* SEÇÕES */
    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 25px 20px 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title i { color: #facc15; } /* Estrela pro Top */

    /* GRID ESTILO 8049.jpg */
    .grid-app {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 0 20px;
    }

    .card-app {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
      color: inherit;
    }

    .capa-container {
      position: relative;
      width: 100%;
      padding-top: 135%; /* Proporção da imagem */
      border-radius: 14px;
      overflow: hidden;
      background: #111;
    }

    .capa-container img {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
    }

    .badge-views {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex; align-items: center; gap: 4px;
    }

    .badge-caps {
      position: absolute;
      bottom: 8px; left: 8px;
      background: #7c3aed; /* Roxo estilo botão da imagem */
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 800;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 5px;
    }

    .chapter-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .chapter-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .chapter-item i { color: #cba6f7; font-size: 0.65rem; }
    .chapter-date { color: rgba(255, 255, 255, 0.5); font-weight: 400; }

    /* MENU INFERIOR ESTILO 8051.jpg */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #14141a;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 15px;
      border-top: 1px solid rgba(255,255,255,0.05);
      z-index: 1000;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: rgba(255,255,255,0.5);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
    }
    .nav-item i { font-size: 1.2rem; }
    .nav-item.active { color: #cba6f7; }
    .nav-item.vip { color: #facc15; } /* Parceiros em destaque amarelo */

    /* MODAIS (Configurações e Login) */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      z-index: 2000;
      display: none;
      flex-direction: column;
      justify-content: flex-end;
    }
    
    .modal-content {
      background: #181820;
      border-radius: 25px 25px 0 0;
      padding: 25px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; text-align: center; }
    
    .config-group { margin-bottom: 20px; }
    .config-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #aaa; }
    .config-group input[type="color"], .config-group input[type="text"], .config-group select {
      width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff;
    }

    /* Toggle Switch */
    .toggle-container {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px;
    }
    .toggle-text { font-size: 0.9rem; font-weight: 600; }
    .toggle-sub { font-size: 0.7rem; color: #888; display: block; }
    .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #cba6f7; }
    input:checked + .slider:before { transform: translateX(22px); }

    .btn-salvar {
      width: 100%; padding: 15px; background: #cba6f7; color: #000; font-weight: 800; border: none; border-radius: 12px; cursor: pointer;
    }

    /* ADAPTAÇÃO DO SEU CSS DE LOGIN (Sem conflitos com o app) */
    .meow-auth-sheet {
      background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px);
      width: 100%; max-height: 95%; overflow-y: auto;
      padding: 30px 25px; border-radius: 35px 35px 0 0;
      text-align: center; color: #ffffff;
      border-top: 1px solid rgba(255,255,255,0.08);
      animation: slideUp 0.3s ease;
    }
    .meow-btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 14px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
    .meow-btn-google { background: #ffffff; color: #121212; }
    .meow-btn-email { background: rgba(255,255,255,0.05); color: #ffffff; border: 1px solid rgba(255,255,255,0.1); }
    .meow-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.4); color: white; outline: none; margin-bottom: 10px;}
    .meow-btn-login { background: #1DB954; color: white; }
    .meow-btn-register { background: transparent; color: #ffffff; border: 1px solid rgba(255,255,255,0.3); }

  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="brand">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj9E-kA-zxQoW_9n37UDtVUc_TH4QhHUJ7ZCxyZWj1zj06dh53wI7Iviqbbs1Y6bId-MYSLEOWZTuuC5a_U9TB4YvMMluSf_Xg65MV437qnxzApy472qVOwvUTnyZgJti8XpDiExf312gj0ogzo8vzvPYhsaczya-oZTS7ztLjd5dCGCTwJVarVoY_VZwUr/s400/6576.png" alt="Logo">
      MEOW SCAN
    </div>
    
    <!-- Busca conectada ao App -->
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass" style="color: #888;"></i>
      <input type="text" id="input-busca" placeholder="Pesquisar por título (ex: P)...">
    </div>
  </div>

  <!-- Filtros -->
  <div class="filters" id="status-filters">
    <button class="filter-btn active" data-status="all">Tudo</button>
    <button class="filter-btn" data-status="em andamento">Em Andamento</button>
    <button class="filter-btn" data-status="completo">Completo</button>
    <button class="filter-btn" data-status="futuro">Futuro</button>
    <button class="filter-btn" data-status="em pausa">Em Pausa</button>
  </div>

  <!-- Top Mais Lidos -->
  <div class="section-title" id="titulo-top"><i class="fa-solid fa-crown"></i> Top Mais Lidos</div>
  <div class="grid-app" id="grid-top"></div>

  <!-- Catálogo -->
  <div class="section-title"><i class="fa-solid fa-layer-group"></i> Atualizações</div>
  <div class="grid-app" id="grid-obras" style="margin-bottom: 30px;">
    <p style="text-align: center; width: 100%; color: #888;">Carregando app...</p>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item active" onclick="window.scrollTo(0,0)">
      <i class="fa-solid fa-house"></i><span>Início</span>
    </a>
    <a href="#" class="nav-item" onclick="document.getElementById('input-busca').focus()">
      <i class="fa-solid fa-magnifying-glass"></i><span>Busca</span>
    </a>
    <a href="#" class="nav-item vip">
      <i class="fa-solid fa-handshake"></i><span>Parceiros</span>
    </a>
    <a href="#" class="nav-item" id="nav-perfil">
      <i class="fa-solid fa-arrow-right-to-bracket"></i><span id="txt-perfil">Entrar</span>
    </a>
    <a href="#" class="nav-item" id="nav-config">
      <i class="fa-solid fa-bars"></i><span>Config</span>
    </a>
  </nav>

  <!-- MODAL: CONFIGURAÇÕES -->
  <div class="modal-overlay" id="modal-config">
    <div class="modal-content">
      <div class="modal-title">Configurações do App</div>
      
      <div class="toggle-container">
        <div>
          <span class="toggle-text">Conteúdo +18</span>
          <span class="toggle-sub">Confirmo que tenho mais de 18 anos.</span>
        </div>
        <label class="switch"><input type="checkbox" id="check-18"><span class="slider"></span></label>
      </div>

      <div class="toggle-container">
        <div>
          <span class="toggle-text">Conteúdo Sensível</span>
          <span class="toggle-sub">Permitir obras com temas pesados.</span>
        </div>
        <label class="switch"><input type="checkbox" id="check-sensivel"><span class="slider"></span></label>
      </div>

      <div class="config-group">
        <label>Cor de Fundo (Hex)</label>
        <input type="color" id="color-bg" value="#0d0d12">
      </div>
      <div class="config-group">
        <label>Cor da Fonte (Hex)</label>
        <input type="color" id="color-text" value="#ffffff">
      </div>
      <div class="config-group">
        <label>Imagem de Fundo (URL) - Opcional</label>
        <input type="text" id="url-bg" placeholder="Cole o link da imagem aqui">
      </div>
      <div class="config-group">
        <label>Estilo de Fonte</label>
        <select id="select-font">
          <option value="'Poppins', sans-serif">Poppins (Padrão)</option>
          <option value="'Roboto', sans-serif">Roboto</option>
          <option value="'Courier New', monospace">Clássica (Typewriter)</option>
        </select>
      </div>

      <button class="btn-salvar" id="btn-fechar-config">Salvar & Fechar</button>
    </div>
  </div>

  <!-- MODAL: SEU SISTEMA DE LOGIN -->
  <div class="modal-overlay" id="modal-login">
    <div class="meow-auth-sheet">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj9E-kA-zxQoW_9n37UDtVUc_TH4QhHUJ7ZCxyZWj1zj06dh53wI7Iviqbbs1Y6bId-MYSLEOWZTuuC5a_U9TB4YvMMluSf_Xg65MV437qnxzApy472qVOwvUTnyZgJti8XpDiExf312gj0ogzo8vzvPYhsaczya-oZTS7ztLjd5dCGCTwJVarVoY_VZwUr/s400/6576.png" style="width: 60px; border-radius: 15px; margin-bottom: 10px;">
      <div style="font-size: 1.2rem; font-weight: 700; margin-bottom: 20px;">Sua próxima leitura te aguarda</div>
      
      <div id="meow-opcoes-iniciais">
        <button id="btn-google-login" class="meow-btn meow-btn-google">
          <span style="color: #ea4335; font-weight: bold; margin-right: 10px;">G</span> Continuar com Google
        </button>
        <button id="meow-btn-show-email" class="meow-btn meow-btn-email">
          ✉ Usar E-mail e Senha
        </button>
      </div>

      <div id="meow-email-form" style="display: none; flex-direction: column;">
        <input type="email" id="meow-email" class="meow-input" placeholder="Digite seu e-mail" />
        <input type="password" id="meow-pass" class="meow-input" placeholder="Sua senha" />
        <button id="btn-login-email" class="meow-btn meow-btn-login">Entrar</button>
        <button id="btn-criar-conta" class="meow-btn meow-btn-register">Criar Nova Conta</button>
      </div>
      
      <button onclick="document.getElementById('modal-login').style.display='none'" style="background: transparent; color: #888; border: none; margin-top: 15px;">Fechar / Visitante</button>
    </div>
  </div>

  <!-- SCRIPTS: FIREBASE V10 (Modular) para não conflitar com seu login -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBDHUlG1Y3DqfMrgNoSw-OmfmUcXeTIKJo",
      authDomain: "meow-scan-ffff0.firebaseapp.com",
      databaseURL: "https://meow-scan-ffff0-default-rtdb.firebaseio.com",
      projectId: "meow-scan-ffff0",
      storageBucket: "meow-scan-ffff0.firebasestorage.app",
      messagingSenderId: "76129834936",
      appId: "1:76129834936:web:c36cd66d16f6622d69e14d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let obrasGlobais = [];

    // ==========================================
    // SISTEMA DE CONFIGURAÇÕES (LOCAL STORAGE)
    // ==========================================
    const userPrefs = JSON.parse(localStorage.getItem('meow_prefs')) || {
      adulto: false, sensivel: false, bg: '#0d0d12', text: '#ffffff', font: "'Poppins', sans-serif", bgImg: ''
    };

    function aplicarPreferencias() {
      document.documentElement.style.setProperty('--bg-color', userPrefs.bg);
      document.documentElement.style.setProperty('--text-color', userPrefs.text);
      document.documentElement.style.setProperty('--font-family', userPrefs.font);
      document.documentElement.style.setProperty('--bg-image', userPrefs.bgImg ? `url(${userPrefs.bgImg})` : 'none');
      
      document.getElementById('check-18').checked = userPrefs.adulto;
      document.getElementById('check-sensivel').checked = userPrefs.sensivel;
      document.getElementById('color-bg').value = userPrefs.bg;
      document.getElementById('color-text').value = userPrefs.text;
      document.getElementById('select-font').value = userPrefs.font;
      document.getElementById('url-bg').value = userPrefs.bgImg;
    }
    aplicarPreferencias();

    // Eventos do Modal de Config
    document.getElementById('nav-config').onclick = () => document.getElementById('modal-config').style.display = 'flex';
    document.getElementById('btn-fechar-config').onclick = () => {
      userPrefs.adulto = document.getElementById('check-18').checked;
      userPrefs.sensivel = document.getElementById('check-sensivel').checked;
      userPrefs.bg = document.getElementById('color-bg').value;
      userPrefs.text = document.getElementById('color-text').value;
      userPrefs.font = document.getElementById('select-font').value;
      userPrefs.bgImg = document.getElementById('url-bg').value;
      
      localStorage.setItem('meow_prefs', JSON.stringify(userPrefs));
      aplicarPreferencias();
      document.getElementById('modal-config').style.display = 'none';
      renderizarObras(); // Atualiza a tela pra mostrar/ocultar +18
    };

    // ==========================================
    // SISTEMA DE LOGIN INTEGRADO AO MENU
    // ==========================================
    const modalLogin = document.getElementById('modal-login');
    document.getElementById('nav-perfil').onclick = () => {
      if(auth.currentUser) {
        if(confirm("Deseja sair da sua conta?")) signOut(auth);
      } else {
        modalLogin.style.display = 'flex';
      }
    };

    onAuthStateChanged(auth, (user) => {
      const txtPerfil = document.getElementById('txt-perfil');
      if (user) {
        txtPerfil.innerText = "Perfil";
        modalLogin.style.display = 'none';
      } else {
        txtPerfil.innerText = "Entrar";
      }
    });

    // Funções dos botões de Login
    document.getElementById('meow-btn-show-email').onclick = () => {
      document.getElementById('meow-opcoes-iniciais').style.display = 'none';
      document.getElementById('meow-email-form').style.display = 'flex';
    };
    document.getElementById('btn-google-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-login-email').onclick = () => {
      signInWithEmailAndPassword(auth, document.getElementById('meow-email').value, document.getElementById('meow-pass').value)
      .catch(e => alert("Erro: E-mail ou senha inválidos."));
    };
    document.getElementById('btn-criar-conta').onclick = () => {
      createUserWithEmailAndPassword(auth, document.getElementById('meow-email').value, document.getElementById('meow-pass').value)
      .then(() => alert("Conta criada!"))
      .catch(e => alert("Erro ao criar conta."));
    };

    // ==========================================
    // RENDERIZAÇÃO DO APP E TOP LIDOS
    // ==========================================
    function formatarData(timestamp) {
      if(!timestamp) return 'Recente';
      const d = new Date(timestamp);
      return d.toLocaleDateString('pt-BR');
    }

    function formatarViews(num) {
      if(!num) return '0';
      if(num >= 1000) return (num/1000).toFixed(1) + 'K';
      return num;
    }

    // Função de Clique na Obra (Abre a obra local e incrementa Views)
    window.abrirObra = function(id) {
      const obraRef = ref(db, `obras/${id}/views`);
      runTransaction(obraRef, (currentViews) => {
        return (currentViews || 0) + 1;
      }).then(() => {
        window.location.href = `obra.html?obra=${id}`;
      }).catch(() => {
        window.location.href = `obra.html?obra=${id}`; // Redireciona mesmo se falhar
      });
    };

    function criarCard(obra) {
      // Pega os 2 últimos capítulos
      let caps = [];
      if(obra.capitulos) {
        caps = Object.values(obra.capitulos).sort((a,b) => b.numero - a.numero).slice(0, 2);
      }
      
      let htmlCaps = caps.map(c => `
        <div class="chapter-item">
          <div><i class="fa-solid fa-sparkles"></i> CAP ${c.numero}</div>
          <div class="chapter-date">${formatarData(c.dataPostagem)}</div>
        </div>
      `).join('');

      return `
        <div class="card-app" onclick="abrirObra('${obra.id}')" style="cursor: pointer;">
          <div class="capa-container">
            <img src="${obra.capaUrl || 'https://via.placeholder.com/300x430'}" loading="lazy">
            <div class="badge-views"><i class="fa-regular fa-eye"></i> ${formatarViews(obra.views)}</div>
            <div class="badge-caps">${caps.length > 0 ? caps[0].numero : 0} CAPS</div>
          </div>
          <div class="card-title">${obra.nome}</div>
          <div class="chapter-list">${htmlCaps}</div>
        </div>
      `;
    }

    function renderizarObras(filtroStatus = 'all', busca = '') {
      const gridTop = document.getElementById('grid-top');
      const gridGeral = document.getElementById('grid-obras');
      
      // Filtra +18 e Sensível conforme Configurações do Usuário
      let obrasFiltradas = obrasGlobais.filter(o => {
        if(o.adulto && !userPrefs.adulto) return false;
        if(o.sensivel && !userPrefs.sensivel) return false; // Assumindo que você tem/terá uma flag "sensivel: true" no banco
        return true;
      });

      // Aplica Busca Textual
      if (busca) {
        obrasFiltradas = obrasFiltradas.filter(o => o.nome.toLowerCase().includes(busca.toLowerCase()));
      }

      // Aplica Filtro de Status
      if (filtroStatus !== 'all') {
        obrasFiltradas = obrasFiltradas.filter(o => o.status && o.status.toLowerCase() === filtroStatus);
      }

      // Renderiza Top Lidos (Apenas se não estiver buscando ou filtrando)
      if (filtroStatus === 'all' && !busca) {
        document.getElementById('titulo-top').style.display = 'flex';
        const topObras = [...obrasFiltradas].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 4);
        gridTop.innerHTML = topObras.map(criarCard).join('');
      } else {
        document.getElementById('titulo-top').style.display = 'none';
        gridTop.innerHTML = '';
      }

      // Renderiza Geral
      gridGeral.innerHTML = obrasFiltradas.length ? obrasFiltradas.map(criarCard).join('') : '<p style="text-align:center;width:100%;">Nenhuma obra encontrada.</p>';
    }

    // Leitura Inicial do Firebase
    onValue(ref(db, 'obras'), (snapshot) => {
      obrasGlobais = [];
      if(snapshot.exists()) {
        snapshot.forEach(child => {
          obrasGlobais.push({ id: child.key, ...child.val() });
        });
      }
      renderizarObras();
    });

    // ==========================================
    // EVENTOS DE BUSCA E FILTROS
    // ==========================================
    document.getElementById('input-busca').addEventListener('input', (e) => {
      renderizarObras('all', e.target.value);
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-status="all"]').classList.add('active');
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('input-busca').value = '';
        renderizarObras(e.target.getAttribute('data-status'));
      });
    });
  </script>
</body>
</html>

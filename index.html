<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Obras - Meow Scan</title>

  <!-- Estilos e Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8b0029; /* Vermelho Vinho */
      --bg: #000000;      /* Fundo Preto */
      --card: #0f0f11;
      --text: #eeeeee;
      --text-muted: #aaaaaa;
    }

    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #fff;
      font-size: 2rem;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
      text-transform: uppercase;
    }

    /* Grid do Catálogo */
    .grid-obras {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    /* Card da Obra */
    .card-obra {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #222;
      transition: transform 0.3s ease, border-color 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      text-decoration: none;
      color: inherit;
    }

    .card-obra:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
      box-shadow: 0 8px 25px rgba(139, 0, 41, 0.4);
    }

    .capa-wrapper {
      position: relative;
      width: 100%;
      padding-top: 140%; /* Aspect ratio de capa comic */
      overflow: hidden;
      background: #111;
    }

    .capa-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge-tipo {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .badge-adulto {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #e63946;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 6px;
      border-radius: 6px;
    }

    .info-obra {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .titulo-obra {
      font-size: 14px;
      font-weight: 800;
      margin: 0 0 6px 0;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .generos-obra {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-tag {
      font-size: 10px;
      color: #10b981;
      font-weight: bold;
      text-transform: uppercase;
      margin-top: auto;
    }

    /* Estado de Carregamento */
    #loading {
      text-align: center;
      padding: 50px;
      font-size: 1.2rem;
      color: var(--text-muted);
    }

    /* Ajuste Responsivo */
    @media (max-width: 600px) {
      .grid-obras {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px;
      }
      .titulo-obra { font-size: 12px; }
      .generos-obra { font-size: 10px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>📚 Nossas Obras</h1>

    <div id="loading">Carregando catálogo... ⏳</div>
    <div id="grid-obras" class="grid-obras"></div>
  </div>

  <!-- SDKs do Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Configuração exata do seu Firebase (igual à do seu painel)
    const firebaseConfig = {
      apiKey: "AIzaSyBDHUlG1Y3DqfMrgNoSw-OmfmUcXeTIKJo",
      authDomain: "meow-scan-ffff0.firebaseapp.com",
      databaseURL: "https://meow-scan-ffff0-default-rtdb.firebaseio.com",
      projectId: "meow-scan-ffff0",
      storageBucket: "meow-scan-ffff0.firebasestorage.app",
      messagingSenderId: "76129834936",
      appId: "1:76129834936:web:c36cd66d16f6622d69e14d"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const fDb = firebase.database();
    const BASE_URL = "https://meowscan7.blogspot.com/p/obra.html?obra=";

    // Função para buscar e exibir todas as obras
    function carregarObras() {
      const grid = document.getElementById('grid-obras');
      const loading = document.getElementById('loading');

      fDb.ref('obras').on('value', snapshot => {
        grid.innerHTML = '';
        loading.style.display = 'none';

        if (!snapshot.exists()) {
          grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Nenhuma obra encontrada.</p>';
          return;
        }

        snapshot.forEach(child => {
          const obra = child.val();
          const id = child.key;

          // Monta o card em HTML
          const card = document.createElement('a');
          card.className = 'card-obra';
          card.href = `${BASE_URL}${id}`;
          card.target = "_blank"; // Abre no Blogger/página da obra

          const capaUrl = obra.capaUrl || 'https://via.placeholder.com/300x430?text=Sem+Capa';
          const tipo = (obra.tipo || 'Manhwa').toUpperCase();
          const generos = obra.generos || 'Gêneros não especificados';
          const status = obra.status ? obra.status.toUpperCase() : 'EM ANDAMENTO';

          card.innerHTML = `
            <div class="capa-wrapper">
              <img class="capa-img" src="${capaUrl}" alt="${obra.nome}" loading="lazy" />
              <span class="badge-tipo">${tipo}</span>
              ${obra.adulto ? '<span class="badge-adulto">18+</span>' : ''}
            </div>
            <div class="info-obra">
              <h3 class="titulo-obra">${obra.nome}</h3>
              <div class="generos-obra">${generos}</div>
              <span class="status-tag">${status}</span>
            </div>
          `;

          grid.appendChild(card);
        });
      });
    }

    // Inicializa a leitura
    carregarObras();
  </script>

</body>
</html>

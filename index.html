<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meow Scan - App</title>
  
  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #8b0029; 
      --bg: #0a0a0c;
      --card: #141416;
      --text: #ffffff;
      --text-muted: #888888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      padding-bottom: 80px; /* Espaço para o menu inferior */
      overflow-x: hidden;
    }

    /* Cabeçalho do App */
    header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(10, 10, 12, 0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    header h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    
    /* Títulos de Seção */
    .section-title {
      font-size: 1.2rem;
      padding: 0 20px;
      margin: 20px 0 10px 0;
      font-weight: 800;
    }

    /* Carrossel Horizontal (Estilo Netflix) para Atualizados */
    .scroll-horizontal {
      display: flex;
      overflow-x: auto;
      gap: 15px;
      padding: 0 20px 20px 20px;
      scroll-snap-type: x mandatory;
    }
    .scroll-horizontal::-webkit-scrollbar { display: none; }
    
    .card-destaque {
      min-width: 140px;
      width: 140px;
      scroll-snap-align: start;
      position: relative;
      text-decoration: none;
      color: inherit;
    }

    /* Grid Normal para o Catálogo */
    .grid-obras {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 15px;
      padding: 0 20px;
    }

    .card-obra {
      position: relative;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    /* Imagens e Capas */
    .capa-wrapper {
      width: 100%;
      padding-top: 140%;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #222;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .capa-wrapper img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Badges (Capítulo e Adulto) */
    .badge-cap {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
    .badge-18 {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #e63946;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 6px;
      border-radius: 6px;
    }

    /* Textos do Card */
    .info-obra { padding-top: 8px; }
    .titulo-obra {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Menu Inferior (Navegação de App) */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(20, 20, 22, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 15px 0;
      z-index: 1000;
      padding-bottom: calc(15px + env(safe-area-inset-bottom));
    }
    .nav-item {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      font-weight: 600;
    }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 20px; }

    /* Aviso Offline */
    #offline-banner {
      display: none;
      background: #f59e0b;
      color: #000;
      text-align: center;
      padding: 5px;
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="offline-banner">Você está offline. Exibindo dados salvos. 📶❌</div>

  <header>
    <h1>MEOW SCAN</h1>
    <div style="width: 35px; height: 35px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
      🔍
    </div>
  </header>

  <div class="section-title">Atualizados Recentemente</div>
  <div class="scroll-horizontal" id="carrossel-atualizados">
    <!-- Obras atualizadas entram aqui -->
  </div>

  <div class="section-title">Todo o Catálogo</div>
  <div class="grid-obras" id="grid-catalogo">
    <!-- Todas as obras entram aqui -->
  </div>

  <!-- Barra de Navegação Inferior -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <span class="nav-icon">🏠</span>
      Início
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">❤️</span>
      Favoritos
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">👤</span>
      Perfil
    </a>
  </nav>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDHUlG1Y3DqfMrgNoSw-OmfmUcXeTIKJo",
      authDomain: "meow-scan-ffff0.firebaseapp.com",
      databaseURL: "https://meow-scan-ffff0-default-rtdb.firebaseio.com",
      projectId: "meow-scan-ffff0",
      storageBucket: "meow-scan-ffff0.firebasestorage.app",
      messagingSenderId: "76129834936",
      appId: "1:76129834936:web:c36cd66d16f6622d69e14d"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const fDb = firebase.database();

    // Monitorar conexão com a internet
    window.addEventListener('offline', () => document.getElementById('offline-banner').style.display = 'block');
    window.addEventListener('online', () => document.getElementById('offline-banner').style.display = 'none');
    if (!navigator.onLine) document.getElementById('offline-banner').style.display = 'block';

    // Função para renderizar as obras na tela
    function renderizarApp(obrasData) {
      const carrossel = document.getElementById('carrossel-atualizados');
      const grid = document.getElementById('grid-catalogo');
      carrossel.innerHTML = '';
      grid.innerHTML = '';

      // Converter objeto em array para ordenar
      const obrasArray = Object.keys(obrasData).map(id => {
        let obra = obrasData[id];
        obra.id = id;
        
        // Descobrir qual é o último capítulo
        let ultimoCapNum = "Novo";
        let timeAtualizacao = obra.timestamp || 0; // Se não tiver capítulo, usa a data de criação

        if (obra.capitulos) {
          const caps = Object.values(obra.capitulos);
          caps.sort((a, b) => b.numero - a.numero); // Pega o maior número
          if (caps.length > 0) {
            ultimoCapNum = "Cap " + caps[0].numero;
            timeAtualizacao = caps[0].dataPostagem || timeAtualizacao; // Usa a data do último cap
          }
        }
        obra.ultimoCapTxt = ultimoCapNum;
        obra.timeAtualizacao = timeAtualizacao;
        return obra;
      });

      // Ordenar por atualização (Mais recentes primeiro)
      obrasArray.sort((a, b) => b.timeAtualizacao - a.timeAtualizacao);

      obrasArray.forEach((obra, index) => {
        // Link apontando para obra.html no próprio GitHub
        const linkHTML = `obra.html?id=${obra.id}`;
        
        const cardHTML = `
          <a href="${linkHTML}" class="${index < 6 ? 'card-destaque' : 'card-obra'}">
            <div class="capa-wrapper">
              <img src="${obra.capaUrl || 'https://via.placeholder.com/300x430'}" loading="lazy">
              <div class="badge-cap">${obra.ultimoCapTxt}</div>
              ${obra.adulto ? '<div class="badge-18">18+</div>' : ''}
            </div>
            <div class="info-obra">
              <div class="titulo-obra">${obra.nome}</div>
            </div>
          </a>
        `;

        // Coloca os 6 mais recentes no carrossel horizontal, e todos no grid de baixo
        if (index < 6) carrossel.innerHTML += cardHTML;
        grid.innerHTML += cardHTML;
      });
    }

    // 1. CARREGAMENTO OFFLINE IMEDIATO (LocalStorage)
    const dadosSalvos = localStorage.getItem('meow_obras_cache');
    if (dadosSalvos) {
      renderizarApp(JSON.parse(dadosSalvos));
    }

    // 2. CARREGAMENTO ONLINE (Firebase)
    fDb.ref('obras').on('value', snapshot => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        // Salva os dados atualizados no celular da pessoa
        localStorage.setItem('meow_obras_cache', JSON.stringify(data));
        // Atualiza a tela
        renderizarApp(data);
      }
    });

  </script>
</body>
</html>

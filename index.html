<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meow Scan - Catalog & Updates</title>

  <!-- Google Fonts & Font Awesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #8b0029;      /* Vermelho Vinho */
      --primary-glow: rgba(139, 0, 41, 0.4);
      --bg: #09090b;           /* Fundo App Super Dark */
      --card-bg: #121215; 
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --badge-new: #10b981;    /* Verde para Novo */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      padding-bottom: 40px;
      user-select: none;
    }

    /* Header Estilo App */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1f1f23;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-title {
      font-size: 1.3rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-title span { color: var(--primary); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 15px;
    }

    /* Títulos de Seção */
    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 20px 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-title i { color: var(--primary); }

    /* Carousel / Grid de Lançamentos Recentes */
    .updates-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 10px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .updates-scroll::-webkit-scrollbar { display: none; }

    .card-update {
      flex: 0 0 140px;
      scroll-snap-align: start;
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid #27272a;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: transform 0.2s;
    }
    .card-update:active { transform: scale(0.96); }

    /* Grid do Catálogo Completo */
    .grid-obras {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }

    /* Card Principal de Obra */
    .card-obra {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #1f1f23;
      display: flex;
      flex-direction: column;
      position: relative;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
    }

    .card-obra:hover {
      border-color: var(--primary);
      box-shadow: 0 0 20px var(--primary-glow);
      transform: translateY(-3px);
    }

    .capa-wrapper {
      position: relative;
      width: 100%;
      padding-top: 142%;
      background: #18181b;
      overflow: hidden;
    }

    .capa-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .card-obra:hover .capa-img {
      transform: scale(1.05);
    }

    /* Badges Flutuantes */
    .badge-tipo {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(139, 0, 41, 0.9);
      backdrop-filter: blur(4px);
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      padding: 3px 7px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .badge-cap-recent {
      position: absolute;
      bottom: 8px; left: 8px; right: 8px;
      background: rgba(16, 185, 129, 0.9);
      backdrop-filter: blur(4px);
      color: #000;
      font-size: 10px;
      font-weight: 800;
      padding: 4px;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .badge-adulto {
      position: absolute;
      top: 8px; right: 8px;
      background: #ef4444;
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      padding: 3px 6px;
      border-radius: 6px;
    }

    .info-obra {
      padding: 10px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .titulo-obra {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .generos-obra {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Loading Spinner */
    .loading-box {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Layout para Telas Menores */
    @media (max-width: 480px) {
      .grid-obras {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 10px;
      }
      .info-obra { padding: 8px; }
      .titulo-obra { font-size: 11px; }
      .generos-obra { font-size: 9px; }
      .card-update { flex: 0 0 110px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand-title">
      <i class="fa-solid fa-cat"></i> MEOW <span>SCAN</span>
    </div>
  </header>

  <div class="container">
    
    <!-- SEÇÃO: Capítulos Atualizados Recentes -->
    <div id="section-recents" style="display: none;">
      <div class="section-title">
        <i class="fa-solid fa-bolt"></i> Capítulos Novos
      </div>
      <div class="updates-scroll" id="container-recents"></div>
    </div>

    <!-- SEÇÃO: Catálogo Geral de Obras -->
    <div class="section-title">
      <i class="fa-solid fa-layer-group"></i> Catálogo de Obras
    </div>

    <div id="loading" class="loading-box">
      <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Carregando catálogo...
    </div>

    <div id="grid-obras" class="grid-obras"></div>

  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDHUlG1Y3DqfMrgNoSw-OmfmUcXeTIKJo",
      authDomain: "meow-scan-ffff0.firebaseapp.com",
      databaseURL: "https://meow-scan-ffff0-default-rtdb.firebaseio.com",
      projectId: "meow-scan-ffff0",
      storageBucket: "meow-scan-ffff0.firebasestorage.app",
      messagingSenderId: "76129834936",
      appId: "1:76129834936:web:c36cd66d16f6622d69e14d"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const fDb = firebase.database();

    function carregarApp() {
      const grid = document.getElementById('grid-obras');
      const recentsContainer = document.getElementById('container-recents');
      const recentsSection = document.getElementById('section-recents');
      const loading = document.getElementById('loading');

      fDb.ref('obras').on('value', snapshot => {
        grid.innerHTML = '';
        recentsContainer.innerHTML = '';
        loading.style.display = 'none';

        if (!snapshot.exists()) {
          grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">Nenhuma obra cadastrada.</p>';
          return;
        }

        let ultimosLancamentos = [];

        snapshot.forEach(child => {
          const obra = child.val();
          const obraId = child.key;

          // 1. Achar o capítulo mais recente dentro da obra
          let ultimoCapitulo = null;
          let ultimoCapNum = 0;

          if (obra.capitulos) {
            Object.keys(obra.capitulos).forEach(capKey => {
              const cap = obra.capitulos[capKey];
              if (cap.numero >= ultimoCapNum) {
                ultimoCapNum = cap.numero;
                ultimoCapitulo = cap;
              }
            });
          }

          if (ultimoCapitulo) {
            ultimosLancamentos.push({
              obraId,
              nomeObra: obra.nome,
              capaUrl: obra.capaUrl,
              capNum: ultimoCapitulo.numero,
              data: ultimoCapitulo.dataPostagem || 0
            });
          }

          // 2. Montar Card do Catálogo Principal (Abre obra.html)
          const card = document.createElement('a');
          card.className = 'card-obra';
          // AQUI: Link direto para o arquivo local no GitHub Pages
          card.href = `obra.html?obra=${obraId}`;

          const capaUrl = obra.capaUrl || 'https://via.placeholder.com/300x430?text=Sem+Capa';
          const tipo = (obra.tipo || 'Manhwa').toUpperCase();

          card.innerHTML = `
            <div class="capa-wrapper">
              <img class="capa-img" src="${capaUrl}" alt="${obra.nome}" loading="lazy" />
              <span class="badge-tipo">${tipo}</span>
              ${obra.adulto ? '<span class="badge-adulto">18+</span>' : ''}
              ${ultimoCapitulo ? `<div class="badge-cap-recent">Cap. ${ultimoCapitulo.numero}</div>` : ''}
            </div>
            <div class="info-obra">
              <h3 class="titulo-obra">${obra.nome}</h3>
              <div class="generos-obra">${obra.generos || 'Gêneros N/A'}</div>
            </div>
          `;

          grid.appendChild(card);
        });

        // 3. Montar Seção de Lançamentos Recentes (Abre capitulo.html direto)
        if (ultimosLancamentos.length > 0) {
          // Ordena pelo último capítulo postado
          ultimosLancamentos.sort((a, b) => b.data - a.data);

          ultimosLancamentos.slice(0, 10).forEach(item => {
            const cardUp = document.createElement('a');
            cardUp.className = 'card-update';
            // AQUI: Link direto para a página do capítulo no seu repositório
            cardUp.href = `capitulo.html?obra=${item.obraId}&cap=${item.capNum}`;

            cardUp.innerHTML = `
              <div class="capa-wrapper">
                <img class="capa-img" src="${item.capaUrl}" alt="${item.nomeObra}" loading="lazy" />
                <div class="badge-cap-recent">Cap. ${item.capNum}</div>
              </div>
              <div class="info-obra">
                <h3 class="titulo-obra">${item.nomeObra}</h3>
              </div>
            `;
            recentsContainer.appendChild(cardUp);
          });

          recentsSection.style.display = 'block';
        }
      });
    }

    carregarApp();
  </script>
</body>
</html>

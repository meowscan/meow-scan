<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"/>
  <title>Meow Scan</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

  <style>
    /* O SEU CSS ORIGINAL MANTIDO AQUI (CORTADO PARA BREVIDADE NA LEITURA, MAS COPIE O SEU CSS COMPLETO AQUI) */
    :root {
        --accent-gradient: linear-gradient(135deg, #FFB6C1, #FFC0CB);
        --accent-color: #FF9EAB; 
        --accent-glow: rgba(255, 158, 171, 0.3);
        --bg-main: #FFF8F9; 
        --glass-bg: rgba(255, 255, 255, 0.85);
        --glass-border: rgba(255, 158, 171, 0.2);
        --text-main: #5C4A4D; 
        --text-dim: #9E8A8D;
        --card-bg: #FFFFFF;
        --success: #34D399;
        --warning: #FBBF24;
        --radius-lg: 24px;
        --radius-md: 16px;
        --transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    body[data-theme="dark"] { 
        --accent-gradient: linear-gradient(135deg, #FF7B93, #FF9EAB); 
        --accent-color: #FF7B93; 
        --accent-glow: rgba(255, 123, 147, 0.15); 
        --bg-main: #1A1617; 
        --glass-bg: rgba(30, 25, 26, 0.9);
        --glass-border: rgba(255, 255, 255, 0.05);
        --text-main: #EAE0E1; 
        --text-dim: #A89B9D; 
        --card-bg: #252021;
    }

    /* CORES EXTRAS OMITIDAS PARA CONCISÃO - MANTENHA AS SUAS AQUI */
    
    body { 
        margin: 0; padding: 0; 
        background-color: var(--bg-main); font-family: 'Inter', sans-serif;
        color: var(--text-main); overflow-x: hidden; -webkit-font-smoothing: antialiased;
        transition: background-color 0.4s ease, color 0.4s ease;
    }
    
    #meow-elite-app { position: relative; padding-bottom: 120px; width: 100%; min-height: 100vh; }
    * { box-sizing: border-box; }
    
    /* CABEÇALHO */
    #meow-elite-app header { 
        position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; 
        padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
        transition: transform 0.4s ease, background 0.3s ease, padding 0.3s ease;
        background: transparent;
    }
    #meow-elite-app header.scrolled {
        background: var(--glass-bg); backdrop-filter: blur(15px);
        border-bottom: 1px solid var(--glass-border); padding: 12px 5%;
    }
    #meow-elite-app .logo img { height: 50px; object-fit: contain; }
    .header-actions { display: flex; gap: 12px; }
    .action-btn { background: var(--card-bg); border: 1px solid var(--glass-border); color: var(--text-main); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    
    /* BOTÃO TELEGRAM */
    .telegram-float { position: fixed; bottom: 90px; right: 20px; background: linear-gradient(135deg, #0088cc, #00aaff); color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; }

    /* BANNER ESTILO NETFLIX */
    .banner-container { position: relative; height: 70vh; min-height: 480px; width: 100%; overflow: hidden; border-radius: 0 0 40px 40px; margin-bottom: 30px; }
    .banner-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease-in-out; display: flex; align-items: flex-end; padding: 80px 5%; }
    .banner-slide.active { opacity: 1; z-index: 10; }
    .banner-bg { position: absolute; inset: 0; background-size: cover; background-position: center 15%; z-index: 1; }
    .banner-gradient { position: absolute; inset: 0; z-index: 2; background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 70%, var(--bg-main) 100%); }
    .banner-content { position: relative; z-index: 20; max-width: 800px; }
    .banner-content h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 800; color: #fff; margin: 0 0 20px 0; }
    .btn-main { padding: 14px 30px; background: var(--accent-gradient); color: #fff; text-decoration: none; font-weight: 700; border-radius: 16px; display: inline-flex; }

    /* GRIDS E SEÇÕES */
    .section-container { padding: 0 5%; margin-top: 50px; margin-bottom: 40px; }
    .secao-titulo { font-family: 'Syne', sans-serif; font-size: 1.6rem; display: flex; align-items: center; gap: 12px; }
    .grid-obras { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px 15px; }
    .obra-img-box { position: relative; aspect-ratio: 1 / 1.45; border-radius: var(--radius-md); overflow: hidden; }
    .obra-img-box img { width: 100%; height: 100%; object-fit: cover; }
    .obra-info { padding: 12px 4px 0; }
    .obra-titulo { font-family: 'Syne', sans-serif; font-size: 1.05rem; color: var(--text-main); margin-bottom: 8px; text-decoration: none;}
    
    /* NAV INFERIOR CORRIGIDA */
    .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 40px; display: flex; gap: 15px; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .nav-link { padding: 10px 15px; border-radius: 30px; color: var(--text-dim); text-decoration: none; font-size: 1.2rem; display: flex; align-items: center; }
    .nav-link.active, .nav-link:hover { color: #fff; background: var(--accent-color); }
    .creditos-rodape { text-align: center; padding: 40px 20px; margin-top: 60px; font-size: 0.9rem; color: var(--text-dim); }
    .creditos-rodape span { color: var(--accent-color); font-weight: 700; }
  </style>
</head>
<body data-theme="dark">

  <div id="meow-elite-app">
      <header id="main-header">
          <a class="logo" href="index.html">
              <img alt="Meow Scan" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi6aC3chQ6doRxYFj6A_QjodQQOV8c9prAxUUcghfLANYhRLyebekvpQGr5yY7N8WyEEN-V4Dm7E9Z_Yt-296fKDPcsPS-l7OE0cxXIRL2U14fqEUWoNnVqsE9SW4vpNPb4vh7uSeO8A9Ml8wXHbxjKC5yQYOTGmHACMzveICcisVx59uMflIg8Gp2ggbcc/s320/3576.png"/>
          </a>
          <div class="header-actions">
              <button class="action-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
          </div>
      </header>

      <div class="banner-container" id="banner-hero"></div>

      <div class="section-container">
          <h2 class="secao-titulo"><i class="fa-solid fa-bolt"></i> Lançamentos Recentes</h2>
          <div class="grid-obras" id="lista-updates"></div>
      </div>

      <div class="section-container">
          <h2 class="secao-titulo"><i class="fa-solid fa-book-open"></i> Obras</h2>
          <div class="grid-obras" id="lista-todas"></div>
      </div>
      
      <a class="telegram-float" href="https://t.me/Meowscann1" target="_blank" title="Telegram">
          <i class="fa-brands fa-telegram"></i>
      </a>

      <div class="creditos-rodape">Desenvolvido com carinho por <span>Sirla</span></div>

      <!-- NAVBAR INFERIOR LIMPA (Sem textos quebrando) -->
      <nav class="bottom-nav" id="mobile-bottom-nav">
          <a class="nav-link active" href="index.html"><i class="fa-solid fa-house"></i></a>
          <a class="nav-link" href="#"><i class="fa-solid fa-list"></i></a>
          <a class="nav-link" href="#"><i class="fa-solid fa-bookmark"></i></a>
          <a class="nav-link" href="#"><i class="fa-solid fa-user"></i></a>
      </nav>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
      function toggleTheme() {
          var body = document.body;
          var icon = document.getElementById('theme-icon');
          if (body.getAttribute('data-theme') === 'dark') {
              body.removeAttribute('data-theme');
              icon.className = 'fa-solid fa-sun';
          } else {
              body.setAttribute('data-theme', 'dark');
              icon.className = 'fa-solid fa-moon';
          }
      }

      var firebaseConfig = { apiKey: "AIzaSyBDHUlG1Y3DqfMrgNoSw-OmfmUcXeTIKJo", databaseURL: "https://meow-scan-ffff0-default-rtdb.firebaseio.com", projectId: "meow-scan-ffff0" };
      if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
      var db = firebase.database();
      
      // ATENÇÃO: As URLs agora apontam para arquivos HTML locais
      var URL_BASE = "obra.html?id=";
      var URL_LEITURA = "leitura.html?id=";

      function renderBanner(slides) {
          var hero = document.getElementById("banner-hero");
          if (!slides.length || !hero) return;
          hero.innerHTML = slides.map((o, i) => `
              <div class="banner-slide ${i===0?'active':''}">
                  <div class="banner-bg" style="background-image:url('${o.capa}')"></div>
                  <div class="banner-gradient"></div>
                  <div class="banner-content">
                      <h1>${o.nome}</h1>
                      <a href="${URL_BASE}${o.id}" class="btn-main"><i class="fa-solid fa-book"></i> Ler Agora</a>
                  </div>
              </div>
          `).join('');
      }

      function renderGrid(container, items) {
          if(!container) return;
          container.innerHTML = items.map(o => `
              <div class="obra-card">
                  <a href="${URL_BASE}${o.id}" style="text-decoration: none;">
                      <div class="obra-img-box"><img src="${o.capa}"/></div>
                      <div class="obra-info">
                          <h3 class="obra-titulo">${o.nome}</h3>
                      </div>
                  </a>
              </div>`).join('');
      }

      db.ref('obras').once('value', function(snapshot) {
          var data = snapshot.val();
          if (data) {
              var lista = Object.keys(data).map(id => ({
                  id: id,
                  nome: data[id].nome || data[id].titulo,
                  capa: data[id].capaUrl || data[id].capa
              }));
              renderBanner(lista.slice(-3));
              renderGrid(document.getElementById("lista-updates"), lista.slice(-10));
              renderGrid(document.getElementById("lista-todas"), lista);
          }
      });
  </script>
</body>
</html>

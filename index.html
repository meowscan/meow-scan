<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meow Scan - App</title>
  
  <!-- Fontes e Ícones -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Roboto:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* VARIÁVEIS DE TEMA (Controladas pelas Configurações) */
    :root {
      --bg-color: #0f0814;
      --card-bg: #1c1326;
      --text-color: #ffffff;
      --text-muted: #9ba1a6;
      --primary: #c288f5;
      --font-app: 'Poppins', sans-serif;
      --bg-image: none;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background-color: var(--bg-color);
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text-color);
      font-family: var(--font-app);
      padding-bottom: 70px; /* Espaço para o menu inferior */
      min-height: 100vh;
      transition: all 0.3s ease;
    }

    /* HEADER */
    header {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      background: rgba(15, 8, 20, 0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .logo-container img { height: 40px; border-radius: 12px; }

    /* VIEWS (Páginas do App) */
    .view-section { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .section-title { font-size: 18px; font-weight: 800; margin: 20px 0 15px; display: flex; align-items: center; gap: 8px; }
    
    /* GRID DE OBRAS (Estilo da imagem 8049.jpg) */
    .grid-obras {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .card-obra {
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .capa-container {
      position: relative;
      width: 100%;
      padding-top: 135%; /* Proporção da capa */
    }

    .capa-container img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .badge-views {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      display: flex; align-items: center; gap: 4px;
    }
    
    .badge-caps {
      position: absolute;
      bottom: 8px; left: 8px;
      background: #7b2cbf;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 800;
      color: #fff;
    }

    .card-info { padding: 12px 10px; }
    
    .titulo-obra {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
    }

    .capitulo-row {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
    }
    .capitulo-row i { color: var(--primary); font-size: 10px; }
    .capitulo-row span.data { color: var(--text-muted); font-size: 10px; font-weight: 400; }

    /* MENU INFERIOR (Estilo da imagem 8051.jpg) */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(20, 11, 28, 0.95);
      backdrop-filter: blur(15px);
      display: flex;
      justify-content: space-around;
      padding: 10px 5px 15px;
      border-top: 1px solid rgba(255,255,255,0.05);
      z-index: 1000;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      background: none;
      border: none;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      font-style: italic;
      cursor: pointer;
    }

    .nav-item i { font-size: 20px; font-style: normal; margin-bottom: 2px; }
    .nav-item.active { color: var(--primary); }
    .nav-item.destaque { color: #f5a623; } /* Parceiros Destaque */

    /* BUSCA E FILTROS */
    .search-box {
      width: 100%;
      padding: 14px 20px;
      border-radius: 20px;
      border: none;
      background: var(--card-bg);
      color: var(--text-color);
      font-size: 14px;
      outline: none;
      margin-bottom: 15px;
    }
    .filtros-scroll {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px;
    }
    .filtros-scroll::-webkit-scrollbar { display: none; }
    .btn-filtro {
      padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.1);
      color: var(--text-color); border: none; white-space: nowrap; font-size: 12px; font-weight: 600;
    }
    .btn-filtro.active { background: var(--primary); color: #fff; }

    /* CONFIGURAÇÕES */
    .config-card {
      background: var(--card-bg);
      padding: 15px; border-radius: 12px; margin-bottom: 15px;
    }
    .config-row {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
    }
    .config-row:last-child { margin-bottom: 0; }
    .config-label { font-size: 14px; font-weight: 600; }
    .toggle-switch {
      position: relative; width: 40px; height: 22px; background: rgba(255,255,255,0.2); border-radius: 20px; cursor: pointer; transition: 0.3s;
    }
    .toggle-switch::after {
      content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: 0.3s;
    }
    .toggle-switch.on { background: var(--primary); }
    .toggle-switch.on::after { transform: translateX(18px); }
    
    input[type="color"], select { background: transparent; color: var(--text-color); border: 1px solid rgba(255,255,255,0.2); padding: 5px; border-radius: 6px; }

  </style>
</head>
<body>

    <div class="logo-container">

  <!-- VIEW: INÍCIO -->

    <div id="grid-top" class="grid-obras"></div>

      </div>
      <button onclick="salvarAparencia()" style="width:100%; padding: 10px; border-radius: 8px; background: var(--primary); color: #fff; border: none; font-weight: bold; margin-top: 10px;">Aplicar Aparência</button>
    </div>
  </main>

  <!-- NAVEGAÇÃO INFERIOR -->
  <nav class="bottom-nav">

    </button>
    <button class="nav-item" onclick="trocarAba('busca')">

  <!-- SCRIPTS DO APP -->
  <script type="module">
    // Importação Firebase Modular V10 (Conforme seu código)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { 
        getAuth, onAuthStateChanged, signOut,
        signInWithEmailAndPassword, createUserWithEmailAndPassword, 
        GoogleAuthProvider, signInWithPopup, signInAnonymously 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBDHUlG1Y3DqfMrgNoSw-OmfmUcXeTIKJo",
        authDomain: "meow-scan-ffff0.firebaseapp.com",
        databaseURL: "https://meow-scan-ffff0-default-rtdb.firebaseio.com",
        projectId: "meow-scan-ffff0",
        storageBucket: "meow-scan-ffff0.firebasestorage.app",
        messagingSenderId: "76129834936",
        appId: "1:76129834936:web:c36cd66d16f6622d69e14d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // ==========================================
    // ESTADOS & CONFIGURAÇÕES LOCAIS
    // ==========================================
    let obrasGlobais = [];
    let allow18 = localStorage.getItem('allow18') === 'true';
    let allowSensitive = localStorage.getItem('allowSensitive') === 'true';

    // Carregar configurações de design salvas
    function carregarAparencia() {
      if(localStorage.getItem('theme-bg')) document.documentElement.style.setProperty('--bg-color', localStorage.getItem('theme-bg'));
      if(localStorage.getItem('theme-text')) document.documentElement.style.setProperty('--text-color', localStorage.getItem('theme-text'));
      if(localStorage.getItem('theme-font')) document.documentElement.style.setProperty('--font-app', localStorage.getItem('theme-font'));
      if(localStorage.getItem('theme-bg-img')) document.documentElement.style.setProperty('--bg-image', `url(${localStorage.getItem('theme-bg-img')})`);
      
      document.getElementById('toggle-18').classList.toggle('on', allow18);
      document.getElementById('toggle-sensivel').classList.toggle('on', allowSensitive);
    }
    carregarAparencia();

    // ==========================================
    // FUNÇÕES DO BANCO DE DADOS (RENDERIZAÇÃO)
    // ==========================================
    const obrasRef = ref(db, 'obras');
    onValue(obrasRef, (snapshot) => {
      const data = snapshot.val();
      obrasGlobais = [];
      if (data) {
        Object.keys(data).forEach(key => {
          obrasGlobais.push({ id: key, ...data[key] });
        });
      }
      renderizarTudo();
    });

    function formatarData(ts) {
      if(!ts) return "Recente";
      const d = new Date(ts);
      return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()}`;
    }

    function criarCard(obra) {
      // Extrair os 2 últimos capítulos
      let capsArray = [];
      if (obra.capitulos) {
        capsArray = Object.values(obra.capitulos).sort((a, b) => b.numero - a.numero);
      }
      
      let htmlCaps = '';
      if(capsArray.length > 0) {
        htmlCaps += `<div class="capitulo-row"><i class="fa-solid fa-wand-magic-sparkles"></i> CAP ${capsArray[0].numero} <span class="data">${formatarData(capsArray[0].dataPostagem)}</span></div>`;
      }
      if(capsArray.length > 1) {
        htmlCaps += `<div class="capitulo-row"><i class="fa-solid fa-wand-magic-sparkles"></i> CAP ${capsArray[1].numero} <span class="data">${formatarData(capsArray[1].dataPostagem)}</span></div>`;
      }
      if(capsArray.length === 0) {
        htmlCaps = `<div class="capitulo-row" style="justify-content:center;">Sem Capítulos</div>`;
      }

      // Simulando views (se não tiver no banco, gera um visual baseado no tamanho do nome pra fingir constância)
      const viewsSimuladas = obra.views || (Math.floor(obra.nome.length * 3.7)) + "K";
      const totalCaps = capsArray.length;
      const urlCapa = obra.capaUrl || 'https://via.placeholder.com/200x300';

      return `
        <a href="obra.html?obra=${obra.id}" class="card-obra">
          <div class="capa-container">
            <span class="badge-views"><i class="fa-regular fa-eye"></i> ${viewsSimuladas}</span>
            <span class="badge-caps">${totalCaps} CAPS</span>
            <img src="${urlCapa}" loading="lazy" alt="${obra.nome}">
          </div>
          <div class="card-info">
            <div class="titulo-obra">${obra.nome}</div>
            ${htmlCaps}
          </div>
        </a>
      `;
    }

    function aplicarFiltroDeIdade(lista) {
      return lista.filter(o => {
        if(o.adulto && !allow18) return false;
        if(o.sensivel && !allowSensitive) return false;
        return true;
      });
    }

    function renderizarTudo() {
      const obrasPermitidas = aplicarFiltroDeIdade(obrasGlobais);

      // 1. TOP MAIS LIDOS (Simulado embaralhando os primeiros para destaque)
      const topObras = [...obrasPermitidas].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 4);
      document.getElementById('grid-top').innerHTML = topObras.map(criarCard).join('');

      // 2. ATUALIZAÇÕES RECENTES (Últimas inseridas)
      const recentesObras = [...obrasPermitidas].reverse().slice(0, 6);
      document.getElementById('grid-recentes').innerHTML = recentesObras.map(criarCard).join('');

      // 3. ABA BUSCA (Carrega todas por padrão)
      renderizarBusca(obrasPermitidas);
    }

    // ==========================================
    // SISTEMA DE BUSCA E FILTROS DE STATUS
    // ==========================================
    const inputBusca = document.getElementById('input-busca');
    const botoesFiltro = document.querySelectorAll('.btn-filtro');
    let filtroStatusAtual = "Todos";

    inputBusca.addEventListener('input', () => { executarFiltrosBusca(); });

    botoesFiltro.forEach(btn => {
      btn.addEventListener('click', (e) => {
        botoesFiltro.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        filtroStatusAtual = e.target.getAttribute('data-status');
        executarFiltrosBusca();
      });
    });

    function executarFiltrosBusca() {
      const texto = inputBusca.value.toLowerCase();
      let obrasPermitidas = aplicarFiltroDeIdade(obrasGlobais);

      const resultado = obrasPermitidas.filter(o => {
        const nomeMatch = o.nome.toLowerCase().includes(texto);
        const statusObra = o.status ? o.status.toLowerCase() : 'em andamento';
        const statusMatch = filtroStatusAtual === "Todos" || statusObra === filtroStatusAtual.toLowerCase();
        return nomeMatch && statusMatch;
      });

      renderizarBusca(resultado);
    }

    function renderizarBusca(lista) {
      const grid = document.getElementById('grid-busca');
      if(lista.length === 0) grid.innerHTML = "<p style='grid-column:1/-1;text-align:center;'>Nenhuma obra encontrada.</p>";
      else grid.innerHTML = lista.map(criarCard).join('');
    }

    // ==========================================
    // LÓGICA DAS CONFIGURAÇÕES (+18 / TEMA)
    // ==========================================
    window.salvarAparencia = function() {
      const bg = document.getElementById('color-bg').value;
      const txt = document.getElementById('color-text').value;
      const font = document.getElementById('font-select').value;
      const bgUrl = document.getElementById('bg-url').value;

      localStorage.setItem('theme-bg', bg);
      localStorage.setItem('theme-text', txt);
      localStorage.setItem('theme-font', font);
      if(bgUrl) localStorage.setItem('theme-bg-img', bgUrl);

      carregarAparencia();
      alert("Aparência aplicada com sucesso!");
    };

    document.getElementById('toggle-18').addEventListener('click', function() {
      if(!allow18) {
        if(confirm("ATENÇÃO: Este conteúdo é restrito para maiores de 18 anos. Você confirma que tem 18 anos ou mais?")) {
          allow18 = true;
          this.classList.add('on');
          localStorage.setItem('allow18', 'true');
        }
      } else {
        allow18 = false;
        this.classList.remove('on');
        localStorage.setItem('allow18', 'false');
      }
      renderizarTudo();
    });

    document.getElementById('toggle-sensivel').addEventListener('click', function() {
      allowSensitive = !allowSensitive;
      this.classList.toggle('on');
      localStorage.setItem('allowSensitive', allowSensitive.toString());
      renderizarTudo();
    });

    // ==========================================
    // LÓGICA DO LOGIN / PERFIL DA SUA SCAN
    // ==========================================
    const provider = new GoogleAuthProvider();
    const containerLogin = document.getElementById('container-login');

    onAuthStateChanged(auth, (user) => {
      const btnLogout = document.getElementById('btn-logout');
      const opcoesIniciais = document.getElementById('meow-opcoes-iniciais');
      const tituloAuth = document.getElementById('titulo-auth');

      if (user) {
        // Usuário logado
        opcoesIniciais.style.display = 'none';
        document.getElementById('meow-email-form').style.display = 'none';
        document.getElementById('btn-anonimo').style.display = 'none';
        btnLogout.style.display = 'block';
        
        tituloAuth.innerHTML = `Bem-vindo(a), Leitor! <br><span style="font-size:12px; font-weight:normal;">Você está conectado.</span>`;
      } else {
        // Deslogado
        opcoesIniciais.style.display = 'block';
        document.getElementById('btn-anonimo').style.display = 'block';
        btnLogout.style.display = 'none';
        tituloAuth.innerHTML = `Sua próxima leitura favorita te aguarda`;
      }
    });

    window.abrirPerfil = function() {
      containerLogin.style.display = 'block';
    }
    window.fecharPerfil = function() {
      containerLogin.style.display = 'none';
    }

    document.getElementById('meow-btn-show-email').addEventListener('click', () => {
        document.getElementById('meow-opcoes-iniciais').style.display = 'none';
        document.getElementById('meow-email-form').style.display = 'flex';
    });

    document.getElementById('btn-google-login').addEventListener('click', async () => {
        try { await signInWithPopup(auth, provider); fecharPerfil(); } 
        catch (e) { alert("Erro ao conectar."); }
    });

    document.getElementById('btn-login-email').addEventListener('click', async () => {
        const email = document.getElementById('meow-email').value;
        const pass = document.getElementById('meow-pass').value;
        try { await signInWithEmailAndPassword(auth, email, pass); fecharPerfil(); } 
        catch (e) { alert("Erro ao entrar."); }
    });

    document.getElementById('btn-criar-conta').addEventListener('click', async () => {
        const email = document.getElementById('meow-email').value;
        const pass = document.getElementById('meow-pass').value;
        try { await createUserWithEmailAndPassword(auth, email, pass); alert("Conta criada!"); fecharPerfil(); } 
        catch (e) { alert("Erro ao criar conta."); }
    });

    document.getElementById('btn-anonimo').addEventListener('click', async () => {
        try { await signInAnonymously(auth); fecharPerfil(); } 
        catch (e) { alert("Erro ao entrar anônimo."); }
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
        await signOut(auth);
        alert("Você saiu da conta.");
    });
  </script>

  <!-- Lógica de Navegação das Abas -->
  <script>
    function trocarAba(abaId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      
      document.getElementById('view-' + abaId).classList.add('active');
      
      const btnAlvo = Array.from(document.querySelectorAll('.nav-item')).find(btn => btn.getAttribute('onclick').includes(abaId));
      if(btnAlvo) btnAlvo.classList.add('active');

      window.scrollTo(0, 0);
    }
  </script>
</body>
</html>
